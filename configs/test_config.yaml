# Model
model:
  checkpoint_path: "path/to/checkpoint.ckpt"
  out_dim: 512
  input_channels: 1

# Data
data:
  batch_size: 256
  num_workers: 0
  patch_size: 32
  grid_spacing: 8

# Evaluation
evaluation:
  knn_k: 1
  distance_threshold: inf
  ratio_threshold: 0.75
  mutual: true
  metric: "euclidean"
  max_distance: 5.0
