model:
  out_dim: 512
  input_channels: 1
loss:
  type: triplet
  margin: 1.0
  temperature: 0.1
  warmup_epochs: 200
  spatial_weight: 0.5
  max_spatial_dist: 48.0
optimizer:
  learning_rate: 0.001
  weight_decay: 0.002
  eta_min: 1.0e-06
trainer:
  max_epochs: 2000
  accelerator: auto
  devices: auto
  log_every_n_steps: 4
data:
  batch_size: 256
  num_workers: 8
  patch_size: 32
  num_samples: 1024
  grid_spacing: 8
  augment: true
  max_angle: 30.0
  initial_angle: 0.0
  angle_warmup_epochs: 1000
evaluation:
  knn_k: 1
  distance_threshold: .inf
  ratio_threshold: 0.8
  mutual: true
  metric: euclidean
  max_distance: 5.0
logger:
  type: tensorboard
  save_dir: logs/
  name: descriptor_experiment
  project: crossmodal-descriptor
  tags:
  - 3d
  - descriptor
